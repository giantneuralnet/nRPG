<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drop RPG</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="game"></canvas>
<button id="audioToggle" class="audio-toggle" type="button" aria-label="Toggle sound">🔊</button>
<div id="menuOverlay" class="menu-overlay">
  <div class="menu-panel" role="dialog" aria-labelledby="menuTitle" aria-describedby="menuSubtitle">
    <h1 id="menuTitle">DROP RPG</h1>
    <p id="menuSubtitle">Swords, shields, potions, bombs, elites, ice, zombies, clouds, and curses.</p>

    <div class="menu-group">
      <div id="choicesLabel" class="menu-label">N = number of choices: 5</div>
      <div class="choice-controls" aria-label="Number of choices">
        <button id="choiceDown" type="button">-</button>
        <button id="choiceUp" type="button">+</button>
      </div>
    </div>

    <div class="menu-group">
      <div class="menu-label">Difficulty</div>
      <div class="difficulty-controls" aria-label="Difficulty">
        <button class="difficulty-button" type="button" data-difficulty="easy">easy</button>
        <button class="difficulty-button" type="button" data-difficulty="normal">normal</button>
        <button class="difficulty-button" type="button" data-difficulty="hard">hard</button>
      </div>
    </div>

    <div class="menu-group">
      <label class="menu-label" for="seedInput">Seed</label>
      <div class="seed-row">
        <input id="seedInput" class="seed-input" type="number" inputmode="numeric">
        <button id="seedClear" class="seed-clear" type="button" aria-label="Clear seed">X</button>
      </div>
    </div>

    <button id="infoButton" class="info-button" type="button">INFO</button>
    <button id="menuAction" class="menu-action" type="button">START</button>
  </div>
</div>
<div id="infoOverlay" class="info-overlay" aria-hidden="true">
  <div class="info-panel" role="dialog" aria-labelledby="infoTitle">
    <button id="infoClose" class="info-close" type="button">CLOSE</button>
    <h2 id="infoTitle">INFO</h2>
    <div id="infoList" class="info-list"></div>
  </div>
</div>

<script src="src/core.js"></script>
<script src="src/systems/audio.js"></script>
<script src="src/render/icons.js"></script>
<script src="src/state.js"></script>
<script src="src/effects.js"></script>
<script src="src/systems/spawning.js"></script>
<script src="src/systems/hero.js"></script>
<script src="src/systems/items.js"></script>
<script src="src/systems/combat.js"></script>
<script src="src/systems/update.js"></script>
<script src="src/render/ui.js"></script>
<script src="src/render/entities.js"></script>
<script src="src/render/effects.js"></script>
<script src="src/menu.js"></script>
<script src="src/render/draw.js"></script>
<script src="src/input.js"></script>
<script src="src/main.js"></script>
</body>
</html>
